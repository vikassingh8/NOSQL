global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: ingestion-service
    static_configs:
      - targets: ['ingestion-service:9101']
  - job_name: api-service
    static_configs:
      - targets: ['api-service:4000']
  - job_name: alert-service
    static_configs:
      - targets: ['alert-service:4100']
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
