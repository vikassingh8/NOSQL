name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {} # manual trigger for the Azure deploy job

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      matrix:
        service: [ingestion-service, api-service, alert-service, satellite-simulator]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }} image
        run: docker build -f services/${{ matrix.service }}/Dockerfile -t otp/${{ matrix.service }}:ci .

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt + validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

  # ─── Manual deploy to Azure ───────────────────────────────────────────────
  # Triggered by hand (workflow_dispatch) to avoid surprise Azure spend.
  # Requires these repo secrets:
  #   AZURE_CREDENTIALS  – output of `az ad sp create-for-rbac --sdk-auth`
  #   ACR_LOGIN_SERVER   – e.g. otpacr.azurecr.io
  #   ACR_USERNAME / ACR_PASSWORD – ACR admin creds (or use OIDC)
  deploy:
    runs-on: ubuntu-latest
    needs: [build-test, docker-build, terraform-validate]
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The Azure VM is Standard_B2ps_v2 (Ampere/arm64), so images must target linux/arm64.
      - name: Build & push ARM64 images
        run: |
          for svc in ingestion-service api-service alert-service satellite-simulator; do
            img="${{ secrets.ACR_LOGIN_SERVER }}/otp-$svc:${{ github.sha }}"
            docker buildx build --platform linux/arm64 \
              -f services/$svc/Dockerfile -t "$img" --push .
          done

      - uses: hashicorp/setup-terraform@v3

      # Apply the VM model (matches terraform.tfvars): single ARM64 VM running the full stack.
      - name: Terraform apply
        working-directory: infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="container_registry=${{ secrets.ACR_LOGIN_SERVER }}" \
            -var="image_tag=${{ github.sha }}" \
            -var="deploy_vm=true"
