<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="fa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <style>
      .head{font-size:12px;font-weight:700;fill:#0f172a}
      .life{stroke:#cbd5e1;stroke-width:1.4;stroke-dasharray:4 4}
      .msg{stroke:#334155;stroke-width:1.6;fill:none}
      .mlbl{font-size:11px;fill:#1e293b}
      .num{font-size:11px;font-weight:700;fill:#fff}
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="540" fill="#ffffff"/>
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Telemetry Data Flow</text>

  <!-- lane headers -->
  <g>
    <rect x="30"  y="48" width="110" height="40" rx="8" fill="#e0f2fe" stroke="#0284c7"/><text x="85"  y="72" text-anchor="middle" class="head">Simulator</text>
    <rect x="175" y="48" width="110" height="40" rx="8" fill="#e0f2fe" stroke="#0284c7"/><text x="230" y="72" text-anchor="middle" class="head">Kafka</text>
    <rect x="320" y="48" width="120" height="40" rx="8" fill="#dcfce7" stroke="#16a34a"/><text x="380" y="72" text-anchor="middle" class="head">Ingestion</text>
    <rect x="480" y="48" width="120" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed"/><text x="540" y="72" text-anchor="middle" class="head">Stores</text>
    <rect x="640" y="48" width="110" height="40" rx="8" fill="#dcfce7" stroke="#16a34a"/><text x="695" y="72" text-anchor="middle" class="head">Alert Svc</text>
    <rect x="785" y="48" width="100" height="40" rx="8" fill="#fef3c7" stroke="#d97706"/><text x="835" y="72" text-anchor="middle" class="head">Dashboard</text>
  </g>

  <!-- lifelines -->
  <line x1="85"  y1="88" x2="85"  y2="500" class="life"/>
  <line x1="230" y1="88" x2="230" y2="500" class="life"/>
  <line x1="380" y1="88" x2="380" y2="500" class="life"/>
  <line x1="540" y1="88" x2="540" y2="500" class="life"/>
  <line x1="695" y1="88" x2="695" y2="500" class="life"/>
  <line x1="835" y1="88" x2="835" y2="500" class="life"/>

  <!-- messages -->
  <line x1="85"  y1="130" x2="228" y2="130" class="msg" marker-end="url(#fa)"/>
  <text x="90"  y="124" class="mlbl">publish telemetry packet</text>
  <circle cx="85" cy="130" r="9" fill="#0284c7"/><text x="85" y="134" text-anchor="middle" class="num">1</text>

  <line x1="230" y1="170" x2="378" y2="170" class="msg" marker-end="url(#fa)"/>
  <text x="236" y="164" class="mlbl">consume</text>
  <circle cx="230" cy="170" r="9" fill="#0284c7"/><text x="230" y="174" text-anchor="middle" class="num">2</text>

  <!-- ingestion self: validate -->
  <path d="M380,205 h44 v26 h-44" class="msg" marker-end="url(#fa)"/>
  <text x="430" y="216" class="mlbl">Zod validate + anomaly check</text>
  <circle cx="380" cy="205" r="9" fill="#16a34a"/><text x="380" y="209" text-anchor="middle" class="num">3</text>

  <line x1="380" y1="270" x2="538" y2="270" class="msg" marker-end="url(#fa)"/>
  <text x="386" y="264" class="mlbl">write log / time-series / health</text>
  <circle cx="380" cy="270" r="9" fill="#16a34a"/><text x="380" y="274" text-anchor="middle" class="num">4</text>

  <line x1="378" y1="320" x2="232" y2="320" class="msg" marker-end="url(#fa)"/>
  <text x="246" y="314" class="mlbl">publish alert (on breach)</text>
  <circle cx="380" cy="320" r="9" fill="#d97706"/><text x="380" y="324" text-anchor="middle" class="num">5</text>

  <line x1="230" y1="360" x2="693" y2="360" class="msg" marker-end="url(#fa)"/>
  <text x="236" y="354" class="mlbl">consume alert</text>
  <circle cx="230" cy="360" r="9" fill="#d97706"/><text x="230" y="364" text-anchor="middle" class="num">6</text>

  <line x1="693" y1="400" x2="542" y2="400" class="msg" marker-end="url(#fa)"/>
  <text x="548" y="394" class="mlbl">persist alert</text>
  <circle cx="695" cy="400" r="9" fill="#16a34a"/><text x="695" y="404" text-anchor="middle" class="num">7</text>

  <line x1="695" y1="440" x2="833" y2="440" class="msg" marker-end="url(#fa)"/>
  <text x="700" y="434" class="mlbl">WebSocket / SSE push</text>
  <circle cx="695" cy="440" r="9" fill="#d97706"/><text x="695" y="444" text-anchor="middle" class="num">8</text>

  <path d="M835,475 h40 v22 h-40" class="msg" marker-end="url(#fa)"/>
  <text x="700" y="488" text-anchor="end" class="mlbl">render live alert</text>
  <circle cx="835" cy="475" r="9" fill="#d97706"/><text x="835" y="479" text-anchor="middle" class="num">9</text>
</svg>
